# ========================================
# FindoTrip - Docker Compose Configuration
# ========================================
# Complete development and production setup

version: '3.8'

services:
  # ========================================
  # FindoTrip Application
  # ========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: findotrip-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    networks:
      - findotrip-network
    volumes:
      # Mount logs directory for persistent logging
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ========================================
  # MongoDB Database
  # ========================================
  mongo:
    image: mongo:6.0
    container_name: findotrip-mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-password}
      - MONGO_INITDB_DATABASE=findotrip
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - findotrip-network
    ports:
      - "27017:27017"  # Expose for development
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --auth --bind_ip_all

  # ========================================
  # Redis Cache (Optional)
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: findotrip-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - findotrip-network
    ports:
      - "6379:6379"  # Expose for development
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # Nginx Reverse Proxy
  # ========================================
  nginx:
    image: nginx:alpine
    container_name: findotrip-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"  # For SSL if configured
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - findotrip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # MongoDB Admin Interface (Development)
  # ========================================
  mongo-express:
    image: mongo-express:latest
    container_name: findotrip-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_ROOT_USERNAME:-admin}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_ROOT_PASSWORD:-password}
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_EXPRESS_USERNAME:-admin}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_PASSWORD:-password}
    depends_on:
      - mongo
    networks:
      - findotrip-network
    profiles:
      - dev  # Only run in development

# ========================================
# Networks
# ========================================
networks:
  findotrip-network:
    driver: bridge

# ========================================
# Volumes
# ========================================
volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
