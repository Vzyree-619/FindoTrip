# ========================================
# FindoTrip - Production Docker Compose
# ========================================
# Production-specific overrides for docker-compose.yml

version: '3.8'

services:
  # ========================================
  # Application (Production)
  # ========================================
  app:
    environment:
      - NODE_ENV=production
      - PORT=3000
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # MongoDB (Production)
  # ========================================
  mongo:
    environment:
      - MONGO_INITDB_ROOT_USERNAME_FILE=/run/secrets/mongo_root_username
      - MONGO_INITDB_ROOT_PASSWORD_FILE=/run/secrets/mongo_root_password
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
      - ./docker/secrets:/run/secrets:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # Redis (Production)
  # ========================================
  redis:
    command: redis-server --appendonly yes --requirepass-file /run/secrets/redis_password
    volumes:
      - redis_data:/data
      - ./docker/secrets:/run/secrets:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # Nginx (Production)
  # ========================================
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./docker/nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - nginx_logs:/var/log/nginx
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # SSL Certificate Manager (Production)
  # ========================================
  certbot:
    image: certbot/certbot:latest
    container_name: findotrip-certbot
    volumes:
      - ./docker/nginx/ssl:/etc/letsencrypt
      - ./docker/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    profiles:
      - ssl

# ========================================
# Networks (Production)
# ========================================
networks:
  findotrip-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-findotrip

# ========================================
# Volumes (Production)
# ========================================
volumes:
  mongo_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/findotrip/data/mongo
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/findotrip/data/redis
  nginx_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/findotrip/logs/nginx
